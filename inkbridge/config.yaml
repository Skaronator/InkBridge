name: "InkBridge"
description: "A lightweight App to capture Home-Assistant dashboard screenshots and optimize them for eInk displays."
version: "1.0.0"
slug: "inkbridge"
url: https://github.com/Skaronator/InkBridge
init: false
arch:
  - aarch64
  - amd64
ports:
  4521/tcp: 4521
options:
  message: "custom things"
  logins:
    - username: beer
      password: "123456"
    - username: cheep
      password: "654321"
  random:
    - haha
    - hihi
  link: "http://example.com/"
  size: 15
  count: 1.2
schema:
  message: str
  logins:
    - username: str
      password: str
  random:
    - "match(^\\w*$)"
  ssh:
    private_key: str
    public_key: str
  link: url
  size: "int(5,20)"
  count: float
  not_need: "str?"
