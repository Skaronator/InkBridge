configuration:
  global:
    name: Global Settings
    description: Base capture, rendering, and scheduling settings used by all pages unless overridden.
    fields:
      host:
        name: Bind Host
        description: Network interface the InkBridge web server should listen on.
      port:
        name: Bind Port
        description: TCP port used by the InkBridge web server.
      width:
        name: Default Width
        description: Default screenshot width in pixels for page captures.
      height:
        name: Default Height
        description: Default screenshot height in pixels for page captures.
      colorscheme:
        name: Default Color Scheme
        description: Default ePaper color palette applied during dithering.
      dither_mode:
        name: Default Dither Mode
        description: Default dithering algorithm used to process captured screenshots.
      zoom:
        name: Default Zoom Level
        description: Default browser zoom level applied before capturing page screenshots.
      cron_schedule:
        name: Refresh Schedule
        description: Default cron expression used to regenerate pages that do not define a page-level refresh schedule.
      render_delay:
        name: Render Delay
        description: Time in milliseconds to wait after page load before capturing the screenshot. Increase this if you notice incomplete renders or "skeleton screens" in the generated Images.
  home_assistant:
    name: Home Assistant API Settings
    description: Settings for connecting to Home Assistant's API to capture authenticated dashboards and use HA's language for error messages.
    fields:
      url:
        name: Home Assistant URL
        description: Base URL of your Home Assistant instance, e.g. https://homeassistant.local:8123
      token:
        name: Long-Lived Access Token
        description: A Home Assistant long-lived access token with permissions to read all dashboards you want to capture.
      language:
        name: Home Assistant Language
        description: |
          The language code (e.g. "en", "de") to use when rendering the home-asssitant dashboard.
          Available options can be found here: https://github.com/home-assistant/frontend/blob/dev/src/translations/translationMetadata.json
  pages:
    name: Pages
    description: List of pages to capture and expose as BMP endpoints.
    fields:
      slug:
        name: Endpoint Slug
        description: URL path segment used for this generated BMP endpoint.
      url:
        name: Source URL
        description: Full page URL to open and capture with Playwright.
      width:
        name: Page Width Override
        description: Optional width override in pixels for this page.
      height:
        name: Page Height Override
        description: Optional height override in pixels for this page.
      colorscheme:
        name: Page Color Scheme Override
        description: Optional color scheme override for this page.
      dither_mode:
        name: Page Dither Mode Override
        description: Optional dithering algorithm override for this page.
      zoom:
        name: Page Zoom Level Override
        description: Optional browser zoom level override applied before capturing this page.
      cron_schedule:
        name: Page Refresh Schedule Override
        description: Optional cron expression override for this page. If omitted, the global refresh schedule is used.
      render_delay:
        name: Page Render Delay Override
        description: Optional render delay override in milliseconds for this page.
network:
  4521/tcp: The webserver port exposed by InkBridge to serve generated BMP images.
